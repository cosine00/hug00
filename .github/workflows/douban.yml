name: douban
on: 
  schedule:
    - cron: "0 0,12 * * *" 
  workflow_dispatch:

jobs:
  douban:
    name: Douban mark data sync
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: delete old file
      run: |
        rm -rf ./assets/data/douban
        
    - name: movie
      uses: lizheming/doumark-action@master
      with:
        id: luckyvici
        type: movie
        format: csv
        dir: ./assets/data/douban

    - name: book
      uses: lizheming/doumark-action@master
      with:
        id: luckyvici
        type: book
        format: csv
        dir: ./assets/data/douban

    # --- 这里是关键：在数据生成后，提交之前进行加工 ---
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install pandas requests
    
    # 核心解决：使用 sudo 强行获取文件所有权并开放权限
    - name: Take ownership and set permissions
      run: |
        sudo chown -R runner:docker assets/data/douban
        chmod -R 777 assets/data/douban

    - name: Fix Poster Links via NeoDB
      run: |
        python scripts/update_poster.py

    # --- 最后一步：提交包含新链接的 CSV ---
    - name: Commit
      uses: EndBug/add-and-commit@v9
      with:
        message: 'chore: sync douban data and fix posters'
        add: './assets/data/douban'