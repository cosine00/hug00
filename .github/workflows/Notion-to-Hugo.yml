name: Pure Notion to Hugo Sync

on:
  schedule:
    - cron: "0 */4 * * *" # 每 4 小时执行一次，可自行调整
  workflow_dispatch:      # 允许手动触发
  repository_dispatch:
    types: 
      - notion_sync

permissions:
  contents: write

jobs:
  build_and_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # 缓存依赖，加快运行速度

      - name: Install Dependencies
        run: |
          # notion-client: 官方 API
          # notion2md: 高效的 Markdown 转换器
          # boto3: AWS S3 兼容库 (用于 Cloudflare R2)
          # pyyaml: 生成 Frontmatter
          pip install notion-client notion2md boto3 pyyaml requests

      - name: Run Sync Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_SECRET }} # 注意这里对应你原有的 Secret 名称
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET}}
          R2_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN}}
        run: |
          python sync_notion.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: 'content/'
          commit_message: "Auto Sync: Update posts from Notion and sync images to R2"
          commit_user_name: "GitHub Action"
          commit_user_email: "action@github.com"