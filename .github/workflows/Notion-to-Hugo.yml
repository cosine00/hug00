name: Pure Notion to Hugo Sync

on:
  schedule:
    - cron: "0 */4 * * *" # 每 4 小时执行一次，可自行调整
  workflow_dispatch:      # 允许手动触发
  repository_dispatch:
    types: 
      - notion_sync

permissions:
  contents: write

jobs:
  build_and_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # 已删除 cache: 'pip'，解决无 requirements.txt 报错的问题

      - name: Install Dependencies
        run: |
          pip install "notion-client<2.7.0" notion2md boto3 pyyaml requests

      - name: Run Sync Script
        env:
          # 修复点：这里的环境变量名称必须与 sync_notion.py 中的 os.environ.get() 完全一致
          NOTION_SECRET: ${{ secrets.NOTION_SECRET }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
        run: |
          python sync_notion.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: 'content/'
          commit_message: "Auto Sync: Update posts from Notion and sync images to R2"
          commit_user_name: "GitHub Action"
          commit_user_email: "action@github.com"