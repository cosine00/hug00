name: Notion to Hugo with R2 Sync

on:
  schedule:
    - cron: "0 */4 * * *" # 每 4 小时执行一次
  workflow_dispatch:      # 允许手动触发
  repository_dispatch:
    types: 
      - notion_sync

permissions:
  contents: write

jobs:
  build_and_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. 将 Notion 转为 Markdown，输出到独立隔离的临时目录
      - name: Convert Notion to Markdown (to Temp Dir)
        uses: Doradx/notion2markdown-action@v1
        with:
          notion_secret: ${{ secrets.NOTION_SECRET }}
          database_id: ${{ secrets.NOTION_DATABASE_ID }}
          pic_migrate: false
          output_page_dir: 'temp_content'
          output_post_dir: 'temp_content/posts/notion'
          clean_unpublished_post: true
          metas_keeped: slug, date, author, tags, draft, created, updated, ptype

      # 2. 准备 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          pip install boto3 requests

      # 3. 核心变动：在临时目录里处理图片。安全隔离，不会误伤其他本地文件！
      - name: Process Images to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
        run: |
          python upload_r2.py

      # 4. 把处理好的、含有 R2 链接的文章，安全地合并到正式目录
      - name: Merge Updates to Content
        run: |
          mkdir -p content/posts/notion
          if [ -d "temp_content" ]; then
            cp -rf temp_content/* content/
          fi

      # 5. 推送到仓库
      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: 'content/'
          commit_message: "Sync posts from Notion and upload images to R2"
          commit_user_name: "GitHub Action"
          commit_user_email: "action@github.com"