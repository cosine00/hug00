name: Notion to Hugo with R2 Sync

on:
  schedule:
    - cron: "0 */4 * * *" # 每 4 小时执行一次
  workflow_dispatch:      # 允许手动触发
  repository_dispatch:
    types: 
      - notion_sync

permissions:
  contents: write

jobs:
  build_and_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 第一步：用强大的开源工具做正文转换
      - name: Convert Notion to Markdown
        uses: Doradx/notion2markdown-action@v1
        with:
          notion_secret: ${{ secrets.NOTION_SECRET }}
          database_id: ${{ secrets.NOTION_DATABASE_ID }}
          pic_migrate: false # 核心：坚决关闭它自带的图床迁移，保留原始链接
          output_page_dir: 'content'
          output_post_dir: 'content/posts/notion'
          clean_unpublished_post: false # 核心：满足你“只更新，不删除”的需求
          metas_keeped: slug, date, author, tags, draft, created, updated, ptype

      # 第二步：准备 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          pip install boto3 requests

      # 第三步：运行我们的极简图床脚本
      - name: Process Images to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
        run: |
          python upload_r2.py

      # 第四步：推送到仓库
      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: 'content/'
          commit_message: "Auto Sync: Update posts and sync images to R2"
          commit_user_name: "GitHub Action"
          commit_user_email: "action@github.com"