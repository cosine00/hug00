<div id="album"></div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
      var memoUrl = "https://memos.hux.ink/"
      var galleryUrl = memoUrl + "api/v1/memo?creatorId=1&rowStatus=NORMAL&tag=相册&limit=8"; // 可能需要调整limit以确保获取足够的数据，但这取决于每个条目下的平均图片数量
  fetch(galleryUrl).then(res => res.json()).then(resdata => {
    var result = '', resultAll = "", data = resdata, photoCount = 0, maxPhotos = 8; // 添加了photoCount和maxPhotos变量
    for (var i = 0; i < data.length; i++) {
      var galleryTitle = data[i].content.replace("#相册 ", '');
      var imgs = galleryTitle.match(/!\[.*?\]\(.*?\)/g); // 简化了正则表达式，假设你的图片格式是 ![alt](url)
      // 解析 content 内 md 格式图片
      if (imgs) {
        imgs.forEach(item => {
          if (photoCount < maxPhotos) { // 检查是否已达到图片上限
            let img = item.match(/\((.*?)\)/)[1], time, title, tmp = item.match(/\[.*?\]/)[0].replace('[', '').replace(']', '');
            if (tmp.indexOf(' ') != -1) {
              time = tmp.split(' ')[0];
              title = tmp.split(' ')[1];
            } else title = tmp;
            result += `<div class="gallery-photo visible"><img class="photo-img" loading='lazy' decoding="async" src="${img}"></a>`;
            title ? result += `<span class="photo-title">${title}</span>` : '';
            time ? result += `<span class="photo-time">${time}</span>` : '';
            result += `</div>`;
            photoCount++; // 更新已处理的图片数量
          }
        });
      }
      // 省略了资源文件解析部分的代码，但你可以在那里也加入相同的photoCount检查
      if (photoCount >= maxPhotos) break; // 如果已达到图片上限，跳出循环
    }
    var galleryDom = document.querySelector('#album');
    var galleryBefore = `<div class="memos-photo-wrapper">`;
    var galleryAfter = `</div>`;
    resultAll = galleryBefore + result + galleryAfter;
    galleryDom.innerHTML = resultAll;
    //图片灯箱
    window.ViewImage && ViewImage.init('.gallery-photo img');
    //相对时间
    window.Lately && Lately.init({ target: '.photo-time' });
  });
});
  </script>
  <script src="/js/marked.min.js"></script>
  <script src="/js/view-image.min.js"></script>
  <script src="/js/lately.min.js"></script>

<style>
.memos-photo-wrapper {
  grid-template-columns: repeat(4,minmax(0,1fr));
  margin-top: .5rem;
  display: grid;
   width: 100%;
  gap: .5rem;
}
.memos-photo{
  position: relative;
  overflow: hidden;
  border-radius: .25rem;
  height: 194px;
}
.memos-photo>img {
  min-height: 100%;
  width: auto;
  min-width: 100%;
  cursor: pointer;
  -o-object-fit: cover;
  object-fit: cover;
  height: auto;
  animation: fadeIn 1s;
  transition: all .4s ease-in-out;
}
.memos-photo span.photo-title,.memos-photo span.photo-time{background: rgba(0, 0, 0, 0.3);padding:0px 8px;font-size:0.9rem;color: #fff;display:none;animation: fadeIn 1s;}
.memos-photo span.photo-title{position:absolute;bottom:4px;left:4px;}
.memos-photo span.photo-time{position:absolute;top:4px;left:4px;font-size:0.8rem;}
.memos-photo:hover span.photo-title,.memos-photo:hover span.photo-time{display:block !important;}
@keyframes fadeIn{
	0% {opacity: 0;}
   100% {opacity: 1;}
}
@media screen and (min-width:480px) and (max-width: 899px) {
  .memos-photo-wrapper{
    grid-template-columns: repeat(3,minmax(0,1fr));
  }
  .memos-photo{
    height: 201px;
  }
}
@media only screen and (max-width: 479px) {
  .memos-photo-wrapper{
    grid-template-columns: repeat(2,minmax(0,1fr));
  }
  .memos-photo{
    height: 171px;
  }
}
</style>
