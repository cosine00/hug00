       <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">

<script>
  function updateScrollArrows() {
    const nav = document.getElementById('memos-month-nav');
    const leftBtn = document.getElementById('scroll-left-btn');
    const rightBtn = document.getElementById('scroll-right-btn');
    if (!nav || !leftBtn || !rightBtn) return;

    // 如果列表不可见，或者内部项不足以触发滚动，则全部置灰
    if (nav.offsetParent === null || nav.scrollWidth <= nav.clientWidth) {
      leftBtn.classList.remove('active-left');
      rightBtn.classList.remove('active-right');
      return;
    }

    // 1. 判断左边是否可以滚动
    if (nav.scrollLeft > 2) {
      leftBtn.classList.add('active-left');
    } else {
      leftBtn.classList.remove('active-left');
    }

    // 2. 判断右边是否可以滚动
    if (Math.ceil(nav.scrollLeft + nav.clientWidth) < nav.scrollWidth - 2) {
      rightBtn.classList.add('active-right');
    } else {
      rightBtn.classList.remove('active-right');
    }
  }

  function scrollMonthNav(dir) {
    const nav = document.getElementById('memos-month-nav');
    if (dir === 'left') nav.scrollBy({ left: -180, behavior: 'smooth' });
    if (dir === 'right') nav.scrollBy({ left: 180, behavior: 'smooth' });
  }

  // 页面加载完成后，监听列表滚动以及动态渲染事件
  document.addEventListener('DOMContentLoaded', () => {
    const nav = document.getElementById('memos-month-nav');
    if (nav) {
      // 监听用户的滑动
      nav.addEventListener('scroll', updateScrollArrows);
      
      // 因为 bb.js 会动态往 ul 里塞入新的月份 li，使用观察者模式监听元素变化
      const observer = new MutationObserver(() => {
        // 给浏览器一点点时间渲染出真实宽度后再计算
        setTimeout(updateScrollArrows, 50); 
      });
      observer.observe(nav, { childList: true, subtree: true });
      
      window.addEventListener('resize', updateScrollArrows);
    }
  });
</script>
