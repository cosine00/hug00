<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博客管理后台 · Counting Stars</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.2.0/github-markdown.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f8fa;--bg3:#f1f3f5;--bg4:#eef1f6;
  --text:#1f2329;--text2:#4e5969;--text3:#86909c;--text4:#c9cdd4;
  --border:#e5e6eb;--border2:#d8dce4;
  --accent:#1f7a4d;--accent-light:#eaf7ef;--accent-dark:#14633c;
  --blue:#3b5bdb;--blue-light:#edf2ff;
  --danger:#e03131;--danger-light:#fff1f0;
  --success:#2f9e44;--success-light:#ebfbee;
  --warning:#f08c00;--warning-light:#fff7e6;
  --purple:#7048e8;--purple-light:#f3f0ff;
  --radius:8px;--radius-lg:12px;--radius-xl:18px;
  --shadow:0 8px 24px rgba(29,33,41,.05),0 1px 2px rgba(29,33,41,.04);
  --shadow-soft:0 1px 3px rgba(29,33,41,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;font-size:14px;color:var(--text);background:var(--bg2);min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden;background:var(--bg2)}
.sidebar{width:236px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;box-shadow:2px 0 12px rgba(29,33,41,.02);z-index:20}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.topbar{height:60px;background:rgba(255,255,255,.94);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;backdrop-filter:saturate(160%) blur(10px);z-index:15}
.content{flex:1;padding:24px;overflow-y:auto;height:calc(100vh - 60px)}

/* Sidebar */
.sidebar-logo{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;min-height:60px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#20c997,var(--accent-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;box-shadow:0 8px 18px rgba(31,122,77,.18)}
.logo-title{font-weight:700;font-size:15px;color:var(--text);letter-spacing:.2px}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-nav{flex:1;padding:18px 0;overflow-y:auto}
.nav-section{padding:10px 20px 8px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;color:var(--text2);transition:all .18s;border-left:3px solid transparent;font-size:13.5px;user-select:none}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--accent-light);color:var(--accent);border-left-color:var(--accent);font-weight:700}
.nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.85}
.sidebar-footer{padding:14px 20px;border-top:1px solid var(--border);background:linear-gradient(180deg,#fff,var(--bg2))}
.sidebar-status{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;line-height:1.35}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text4);flex-shrink:0}
.status-dot.ok{background:var(--success);box-shadow:0 0 8px rgba(47,158,68,.45)}
.status-dot.err{background:var(--danger);box-shadow:0 0 8px rgba(224,49,49,.35)}

/* Topbar */
.page-title{font-size:17px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;min-width:0}
.page-title small{font-size:12px;font-weight:500;color:var(--text3)}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all .15s;line-height:1;white-space:nowrap;box-shadow:0 1px 0 rgba(29,33,41,.02)}
.btn:hover{background:var(--bg2);color:var(--text);border-color:#bfc5d1}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(31,122,77,.18)}
.btn.primary:hover{background:var(--accent-dark);border-color:var(--accent-dark);color:#fff}
.btn.blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.danger{color:var(--danger);border-color:#f0b7b7;background:#fff}
.btn.danger:hover{background:var(--danger-light);border-color:var(--danger);color:var(--danger)}
.btn.ghost{border-color:transparent;background:transparent;box-shadow:none}
.btn.sm{padding:6px 9px;font-size:12px;border-radius:6px}
.btn.icon{width:34px;height:34px;padding:0}

/* Cards */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);margin-bottom:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.card-title{font-weight:700;font-size:15px;color:var(--text)}
.card-desc{font-size:12.5px;color:var(--text3);margin-top:4px;line-height:1.5}

/* Dashboard */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:18px}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow-soft);position:relative;overflow:hidden;cursor:pointer;transition:.16s}
.stat-card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.stat-card.active{border-color:rgba(31,122,77,.45);box-shadow:0 0 0 3px rgba(31,122,77,.08)}
.stat-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.stat-card.pub::after{background:var(--success)}
.stat-card.dra::after{background:var(--warning)}
.stat-card.trash::after{background:var(--text3)}
.stat-card.tagstat::after{background:var(--purple)}
.stat-label{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:8px;letter-spacing:.04em}
.stat-value{font-size:28px;font-weight:800;color:var(--text);line-height:1}
.stat-note{font-size:12px;color:var(--text3);margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Article management */
.management-shell{display:grid;grid-template-columns:1fr;gap:16px}
.segmented{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.seg-btn{border:1px solid var(--border);background:var(--bg);border-radius:999px;padding:7px 12px;font-size:13px;color:var(--text2);cursor:pointer;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.seg-btn:hover{border-color:var(--accent);color:var(--accent)}
.seg-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 10px rgba(31,122,77,.18)}
.seg-count{font-size:11px;padding:2px 6px;border-radius:999px;background:rgba(255,255,255,.24)}
.seg-btn:not(.active) .seg-count{background:var(--bg3);color:var(--text3)}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-box{position:relative;flex:1;min-width:260px}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text3)}
.search-input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);font-size:13.5px;outline:none;transition:.15s;color:var(--text)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,122,77,.12)}
select.filter,.form-select{padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);font-size:13.5px;cursor:pointer;outline:none;color:var(--text2);min-height:36px}
select.filter:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,122,77,.1)}
.batch-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(180deg,#fff,var(--bg2));border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:14px;color:var(--text2);font-size:13px}
.batch-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* Table */
.table-wrap{overflow-x:auto;margin:0 -20px}
table{width:100%;border-collapse:collapse;text-align:center;min-width:780px}
th{font-size:12px;font-weight:700;color:var(--text2);padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;text-align:center}
td{padding:14px 20px;border-bottom:1px solid var(--border);font-size:13.5px;color:var(--text);vertical-align:middle;text-align:center}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fbfcfd}
.check-cell{width:44px;text-align:center}
.row-check{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.article-title-cell{display:flex;flex-direction:column;align-items:stretch;gap:6px;min-width:220px;max-width:520px;margin:0 auto;text-align:left}
.article-title-main{font-weight:700;color:var(--text);line-height:1.35;display:flex;align-items:center;justify-content:flex-start;gap:8px;min-width:0;text-align:left}
.article-title-main span:first-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:420px}
.article-title-link{border:none;background:transparent;color:var(--text);font:inherit;font-weight:800;cursor:pointer;max-width:460px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;padding:0;line-height:1.35}
.article-title-link:hover{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
.article-excerpt{font-size:12.5px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:520px;line-height:1.4}
.article-path{display:flex;align-items:center;justify-content:flex-start;gap:6px;color:var(--text3);font-size:12px;max-width:520px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0}
.path-dot{width:5px;height:5px;border-radius:50%;background:var(--text4);flex-shrink:0}
.tag-list{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;max-width:260px;margin:0 auto}
.tag{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700;line-height:1;white-space:nowrap}
.tag.draft{background:var(--warning-light);color:#ad6800}
.tag.published{background:var(--success-light);color:#1b6e30}
.tag.trash{background:var(--bg3);color:var(--text2)}
.tag.meta{background:var(--blue-light);color:#2b43b0}
.tag.soft{background:var(--bg3);color:var(--text2)}
.tag.purple{background:var(--purple-light);color:var(--purple)}
.action-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;background:var(--bg3);padding:2px 6px;border-radius:5px;color:var(--text2)}
.muted{color:var(--text3)}
.nowrap{white-space:nowrap}

/* Editor */
.editor-wrap{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:20px;height:calc(100vh - 108px);overflow:hidden;margin:-24px;padding:20px 24px 24px;background:var(--bg2)}
.editor-left{display:flex;flex-direction:column;min-width:0;height:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
.editor-right{height:100%;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-right:4px}
.editor-title-panel{padding:18px 20px 14px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#fff,#fbfcfd)}
.title-input{border:none;outline:none;width:100%;font-size:25px;line-height:1.25;font-weight:800;color:var(--text);background:transparent;margin-bottom:10px}
.title-input::placeholder{color:var(--text4)}
.desc-input{border:none;outline:none;width:100%;font-size:14px;color:var(--text2);background:transparent;resize:none;min-height:34px;line-height:1.55}
.desc-input::placeholder{color:var(--text4)}
.editor-meta-line{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text3);margin-top:10px}
.editor-left .EasyMDEContainer{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.editor-toolbar{border-top:none!important;border-left:none!important;border-right:none!important;border-bottom:1px solid var(--border)!important;background:var(--bg2)!important;border-radius:0!important;padding:7px 10px!important;opacity:1!important}
.CodeMirror{flex:1;height:100%!important;border:none!important;font-size:14px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,Monaco,monospace;line-height:1.72;padding:10px 18px;color:var(--text)}
.CodeMirror-scroll{min-height:100%}
.editor-preview,.editor-preview-side{background:#fff;color:var(--text)}
.fm-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-soft)}
.fm-card-title{font-weight:800;font-size:13px;color:var(--text);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.fm-group{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.fm-label{font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;justify-content:space-between;gap:6px}
.fm-input,.fm-textarea{padding:9px 11px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;color:var(--text);outline:none;transition:.15s;background:var(--bg);width:100%}
.fm-textarea{min-height:76px;resize:vertical;line-height:1.55}
.fm-input:focus,.fm-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,122,77,.1)}
.tags-input-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:7px 9px;border:1px solid var(--border2);border-radius:var(--radius);min-height:40px;background:var(--bg);cursor:text}
.tags-input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,122,77,.1)}
.tag-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-light);color:var(--accent-dark);padding:4px 8px;border-radius:999px;font-size:12px;font-weight:700}
.tag-chip .remove{cursor:pointer;opacity:.65;font-weight:900;line-height:1}
.tag-chip .remove:hover{opacity:1;color:var(--danger)}
.tags-input{border:none;outline:none;font-size:13px;min-width:70px;flex:1;background:transparent;height:24px;color:var(--text)}
.switch-wrap{display:flex;align-items:center;gap:10px;padding:4px 0;font-size:13px;color:var(--text2)}
.switch{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:var(--border2);border-radius:24px;transition:.2s}
.slider:before{position:absolute;content:"";width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(29,33,41,.25)}
input:checked+.slider{background:var(--accent)}
input:checked+.slider:before{transform:translateX(18px)}
.helper-list{display:grid;gap:8px;font-size:12.5px;color:var(--text2);line-height:1.55}
.helper-list div{display:flex;gap:7px;align-items:flex-start}
.autosave-box{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12.5px;color:var(--text3);border-top:1px dashed var(--border);padding-top:12px;margin-top:4px}

/* Reader */
.reader-wrap{max-width:920px;margin:0 auto;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:42px;box-shadow:var(--shadow)}
.reader-header{margin-bottom:32px;padding-bottom:22px;border-bottom:1px solid var(--border)}
.reader-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:14px}
.reader-title{font-size:32px;font-weight:850;line-height:1.25;color:var(--text);margin:0;letter-spacing:-.02em;min-width:0}
.reader-title-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;padding-top:2px}
.reader-desc{font-size:15px;color:var(--text2);line-height:1.65;margin-bottom:16px}
.reader-meta{display:flex;gap:12px;color:var(--text3);font-size:13px;align-items:center;flex-wrap:wrap}
.markdown-body{font-size:15px;line-height:1.78}
.markdown-body img{border-radius:8px}

/* Settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.setting-group{display:flex;flex-direction:column;gap:7px}
.setting-label{font-size:12px;font-weight:700;color:var(--text2)}
.setting-input{padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;color:var(--text);outline:none;transition:.15s;background:var(--bg)}
.setting-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,122,77,.1)}
.section-title{font-size:14px;font-weight:800;color:var(--accent);margin:24px 0 12px;border-left:4px solid var(--accent);padding-left:9px}

/* Global Components */
.toast-container{position:fixed;top:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:10px;max-width:360px}
.toast{background:#1f2329;color:#fff;padding:12px 16px;border-radius:var(--radius);font-size:13.5px;font-weight:600;box-shadow:0 10px 24px rgba(0,0,0,.18);opacity:0;transform:translateY(-10px);transition:all .24s;line-height:1.45}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.toast.warning{background:var(--warning)}
.loading{display:flex;align-items:center;justify-content:center;padding:70px 20px;color:var(--text3);font-size:14px;gap:12px;text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
.alert{padding:13px 16px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;line-height:1.55}
.alert.warning{background:var(--warning-light);color:#ad6800;border:1px solid #ffd591}
.alert.danger{background:var(--danger-light);color:var(--danger);border:1px solid #ffa39e}
.alert.info{background:var(--blue-light);color:#2b43b0;border:1px solid #bac8ff}
.empty-state{text-align:center;padding:54px 20px;color:var(--text3);font-size:13.5px;line-height:1.7}
.empty-state .empty-icon{font-size:34px;margin-bottom:10px;opacity:.75}
.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;border:1px solid var(--border2);border-bottom-width:2px;background:var(--bg2);padding:1px 5px;border-radius:4px;font-size:11px;color:var(--text2)}

@media (max-width:1080px){
  .editor-wrap{grid-template-columns:1fr;height:auto;overflow:auto}
  .editor-left{min-height:680px}
  .editor-right{height:auto;overflow:visible;padding-right:0}
}
@media (max-width:860px){
  .app{display:block;height:auto;min-height:100vh;overflow:auto}
  .sidebar{width:100%;height:auto;position:sticky;top:0;z-index:30;border-right:none;border-bottom:1px solid var(--border)}
  .sidebar-logo{padding:12px 16px;min-height:52px}
  .sidebar-nav{display:flex;align-items:center;padding:0 8px 10px;overflow-x:auto;gap:4px}
  .nav-section{display:none}
  .nav-item{border-left:none;border-bottom:2px solid transparent;padding:9px 12px;border-radius:8px;white-space:nowrap}
  .nav-item.active{border-left:none;border-bottom-color:var(--accent)}
  .sidebar-footer{display:none}
  .main{min-height:calc(100vh - 100px)}
  .topbar{height:auto;min-height:58px;padding:12px 16px;align-items:flex-start;flex-direction:column}
  .topbar-actions{margin-left:0;width:100%;justify-content:flex-start}
  .content{height:auto;min-height:calc(100vh - 120px);padding:16px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .settings-grid{grid-template-columns:1fr}
  .setting-group[style*="span 2"]{grid-column:auto!important}
  .editor-wrap{margin:-16px;padding:16px;height:auto}
  .reader-wrap{padding:24px}
  .reader-title{font-size:26px}
  .reader-title-row{flex-direction:column;align-items:stretch}
  .reader-title-actions{justify-content:flex-start;padding-top:0}
}
@media (max-width:560px){
  .stats-grid{grid-template-columns:1fr}
  .toolbar{align-items:stretch}
  .search-box,select.filter,.btn{width:100%}
  .batch-bar{align-items:flex-start;flex-direction:column}
}
</style>
</head>
<body>
<div class="app" id="app">

// ============================================================
// Counting Stars Hugo Admin
// 单文件后台：GitHub 内容管理 + Hugo Front Matter + Vercel 状态查看
// ============================================================
let CFG = {
  token: '', owner: '', repo: '', branch: 'main', postsPath: 'content/posts',
  blogUrl: 'https://hux.ink', vercelProjectId: '', vercelToken: ''
};

let STATE = {
  page: 'posts', posts: [], searchQuery: '', statusTab: 'all', tagFilter: 'all', yearFilter: 'all', sortBy: 'date_desc',
  selected: new Set(), editingPost: null, activeTags: [], mde: null, dirty: false, autosaveTimer: null, lastAutosaveAt: null
};

const ICON_SEARCH = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>';

function saveCfg(){ localStorage.setItem('hugo_admin_cfg', JSON.stringify(CFG)); }
function loadCfg(){ try{ const s=localStorage.getItem('hugo_admin_cfg'); if(s) Object.assign(CFG, JSON.parse(s)); }catch(e){} }
function cleanPath(p){ return String(p||'').replace(/^\/+|\/+$/g,''); }
function normalizePostsPath(){ return cleanPath(CFG.postsPath || 'content/posts'); }
function escapeHTML(v){ return String(v ?? '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function escapeAttr(v){ return escapeHTML(v).replace(/'/g,'&#39;'); }
function encodePath(path){ return encodeURIComponent(path); }
function formatDate(v){ if(!v) return '未设置'; return String(v).replace('T',' ').slice(0,16); }
function formatDateShort(v){ if(!v) return '未设置'; return String(v).slice(0,10); }
function nowLocalString(){ const d=new Date(); const pad=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
function slugify(str){ return String(str||'post').trim().toLowerCase().replace(/[\s_]+/g,'-').replace(/[^\w\-\u4e00-\u9fa5]+/g,'').replace(/-+/g,'-').replace(/^-|-$/g,'') || `post-${Date.now()}`; }
function countWords(text){ const t=String(text||'').replace(/```[\s\S]*?```/g,'').replace(/[#>*_`\-\[\]()!]/g,' '); const cn=(t.match(/[\u4e00-\u9fa5]/g)||[]).length; const en=(t.replace(/[\u4e00-\u9fa5]/g,' ').match(/[A-Za-z0-9]+/g)||[]).length; return cn + en; }
function readMinutes(text){ return Math.max(1, Math.ceil(countWords(text)/400)); }
function getExcerpt(body, desc){ if(desc) return String(desc).trim(); return String(body||'').replace(/```[\s\S]*?```/g,'').replace(/[#>*_`\[\]()!]/g,'').replace(/\s+/g,' ').trim().slice(0,120); }
function normalizeTags(tags){ if(Array.isArray(tags)) return tags.map(t=>String(t).trim()).filter(Boolean); if(!tags) return []; return String(tags).split(',').map(t=>t.trim()).filter(Boolean); }
function isDraftValue(v){ return v === true || String(v).toLowerCase() === 'true' || String(v).toLowerCase() === 'yes'; }

function renderNoConfig(){
  return `<div class="alert warning">未检测到核心变量配置。请先前往 <strong>系统设置</strong> 页面配置 GitHub Token、Owner、Repo 和文章目录。</div>`;
}

function toast(msg, type='info'){
  const c=document.getElementById('toast-container'); const t=document.createElement('div');
  t.className=`toast show ${type==='error'?'error':type==='success'?'success':type==='warning'?'warning':''}`;
  t.textContent=msg; c.appendChild(t);
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),260); }, type==='error'?4600:3000);
}

// ============================================================
// GitHub API
// ============================================================
async function ghFetch(path, opts={}){
  if(!CFG.token||!CFG.owner||!CFG.repo) throw new Error('请先在系统设置中保存 GitHub 配置及有效凭证');
  const base = `https://api.github.com/repos/${CFG.owner}/${CFG.repo}`;
  const res = await fetch(base+path, {
    ...opts,
    headers:{
      'Authorization': `Bearer ${CFG.token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
      ...(opts.headers||{})
    }
  });
  if(!res.ok){ const err=await res.json().catch(()=>({})); throw new Error(err.message||`GitHub API 错误：${res.status}`); }
  return res.json();
}

async function ghGraphQL(query, variables={}){
  if(!CFG.token) throw new Error('Token 凭证缺失');
  const res = await fetch('https://api.github.com/graphql', {
    method:'POST',
    headers:{'Authorization':`Bearer ${CFG.token}`,'Content-Type':'application/json'},
    body:JSON.stringify({query,variables})
  });
  if(!res.ok) throw new Error(`GraphQL 通讯异常：${res.status}`);
  const data=await res.json(); if(data.errors) throw new Error(data.errors[0].message);
  return data.data;
}

async function getFileContent(path){
  const data=await ghFetch(`/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}?ref=${encodeURIComponent(CFG.branch)}`);
  const binary=atob(String(data.content||'').replace(/\n/g,''));
  const bytes=Uint8Array.from(binary, c=>c.charCodeAt(0));
  return {content:new TextDecoder().decode(bytes), sha:data.sha, path:data.path};
}

async function putFile(path, content, sha, message){
  const encoded=btoa(unescape(encodeURIComponent(content)));
  const body={message, content:encoded, branch:CFG.branch}; if(sha) body.sha=sha;
  return ghFetch(`/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`, {method:'PUT', body:JSON.stringify(body)});
}

async function deleteFile(path, sha, message){
  return ghFetch(`/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`, {
    method:'DELETE', body:JSON.stringify({message, sha, branch:CFG.branch})
  });
}

// ============================================================
// Front Matter Parser / Builder
// ============================================================
function parseScalar(v){
  const s=String(v??'').trim();
  if(s === 'true') return true; if(s === 'false') return false;
  if((s.startsWith('"') && s.endsWith('"')) || (s.startsWith("'") && s.endsWith("'"))) return s.slice(1,-1);
  if(s.startsWith('[') && s.endsWith(']')) return s.slice(1,-1).split(',').map(x=>x.trim().replace(/^("|')|("|')$/g,'')).filter(Boolean);
  return s;
}

function parseFrontMatter(raw){
  const normalized=String(raw||'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const match=normalized.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if(!match) return {fm:{}, body:normalized};
  const fmStr=match[1], body=match[2], fm={};
  const lines=fmStr.split('\n'); let currentKey=null; let listItems=null;
  for(const line of lines){
    if(/^\s*#/.test(line) || !line.trim()) continue;
    const listMatch=line.match(/^\s+-\s*(.*)$/);
    if(listMatch && currentKey){ listItems=listItems||[]; listItems.push(parseScalar(listMatch[1])); fm[currentKey]=listItems; continue; }
    const kv=line.match(/^([\w-]+):\s*(.*)$/);
    if(kv){ currentKey=kv[1]; const val=kv[2]; if(val.trim()===''){ listItems=[]; fm[currentKey]=listItems; } else { listItems=null; fm[currentKey]=parseScalar(val); } }
  }
  return {fm, body};
}

function quoteYaml(v){
  if(typeof v === 'boolean') return v ? 'true' : 'false';
  const s=String(v??'');
  if(s === '') return '""';
  if(/[\n:#\[\]{}|>&*!%@`,]/.test(s) || /^[-?]/.test(s) || /\s$|^\s/.test(s)) return '"'+s.replace(/\\/g,'\\\\').replace(/"/g,'\\"')+'"';
  return s;
}

function buildFrontMatter(fm, body){
  const order=['title','author','date','lastmod','description','tags','categories','slug','draft','cover','trashOriginalPath','deletedAt'];
  const done=new Set(); let out='---\n';
  function writeKey(k,v){
    if(v===undefined || v===null || v==='') return;
    done.add(k);
    if(Array.isArray(v)){
      out+=`${k}:\n`;
      v.filter(x=>String(x).trim()).forEach(item=>{ out+=`  - ${quoteYaml(item)}\n`; });
    }else out+=`${k}: ${quoteYaml(v)}\n`;
  }
  order.forEach(k=>writeKey(k,fm[k]));
  Object.entries(fm).forEach(([k,v])=>{ if(!done.has(k)) writeKey(k,v); });
  out+='---\n'; if(body && !String(body).startsWith('\n')) out+='\n'; return out + (body||'');
}

// ============================================================
// Router / Status
// ============================================================
function showPage(page){
  if(STATE.page === 'editor' && STATE.dirty && !confirm('当前文章有未保存修改，确定离开编辑器吗？')) return;
  STATE.page=page; STATE.dirty=false;
  if(STATE.mde){ try{ STATE.mde.toTextArea(); }catch(e){} STATE.mde=null; }
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById('nav-'+page); if(nav) nav.classList.add('active');
  const c=document.getElementById('main-content'); c.style.overflow='auto';
  switch(page){ case 'posts': renderPostsPage(); break; case 'deploy': renderDeployPage(); break; case 'settings': renderSettingsPage(); break; }
}

async function checkStatus(){
  const dot=document.getElementById('status-dot'), txt=document.getElementById('status-text');
  if(!CFG.token||!CFG.owner||!CFG.repo){ dot.className='status-dot err'; txt.textContent='未连接仓库'; return false; }
  try{
    await ghFetch(`/git/ref/heads/${encodeURIComponent(CFG.branch).replace(/%2F/g,'/')}`);
    dot.className='status-dot ok'; txt.textContent=`正常：${CFG.owner}/${CFG.repo}`; return true;
  }catch(e){ dot.className='status-dot err'; txt.textContent='连接或鉴权失败'; return false; }
}

// ============================================================
// Article Management
// ============================================================
async function renderPostsPage(){
  STATE.page='posts'; STATE.selected.clear();
  document.getElementById('page-title').innerHTML='文章管理 <small>公众号后台式内容工作台</small>';
  document.getElementById('topbar-actions').innerHTML=`
    <button class="btn" onclick="refreshPosts()">刷新同步</button>
    <button class="btn primary" onclick="openNewPost()">新建文章</button>`;
  const c=document.getElementById('main-content'); c.style.overflow='auto';
  if(!CFG.token){ c.innerHTML=renderNoConfig(); return; }
  c.innerHTML=`<div class="loading"><div class="spinner"></div>正在从 GitHub 同步文章树和 Front Matter…</div>`;
  try{
    await loadPosts();
    c.innerHTML=`
      <div class="management-shell">
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">文章列表</div>
            </div>
            <div class="segmented" id="status-tabs"></div>
          </div>
          <div class="toolbar">
            <div class="search-box">${ICON_SEARCH}<input type="text" class="search-input" id="table-search" placeholder="搜索标题、摘要、标签或文件路径…" value="${escapeAttr(STATE.searchQuery)}"></div>
            <select class="filter" id="year-filter"></select>
            <select class="filter" id="tag-filter"></select>
            <select class="filter" id="sort-filter">
              <option value="date_desc">按日期倒序</option>
              <option value="date_asc">按日期正序</option>
              <option value="title_asc">按标题 A-Z</option>
              <option value="words_desc">按字数最多</option>
            </select>
          </div>
          <div id="table-render-box"></div>
        </div>
      </div>`;
    document.getElementById('table-search').addEventListener('input', e=>{ STATE.searchQuery=e.target.value; renderPostsTableBody(); });
    document.getElementById('year-filter').addEventListener('change', e=>{ STATE.yearFilter=e.target.value; STATE.selected.clear(); renderPostsTableBody(); });
    document.getElementById('tag-filter').addEventListener('change', e=>{ STATE.tagFilter=e.target.value; STATE.selected.clear(); renderPostsTableBody(); });
    document.getElementById('sort-filter').value=STATE.sortBy;
    document.getElementById('sort-filter').addEventListener('change', e=>{ STATE.sortBy=e.target.value; renderPostsTableBody(); });
    renderPostsTableBody();
  }catch(e){ c.innerHTML=`<div class="alert danger">数据读取失败：${escapeHTML(e.message)}<br>请检查仓库、分支、Token 权限和文章扫描根路径。</div>`; }
}

async function refreshPosts(){ toast('正在重新同步远程仓库…'); await renderPostsPage(); }

async function loadPosts(){
  const branchRef=encodeURIComponent(CFG.branch).replace(/%2F/g,'/');
  const treeRes=await ghFetch(`/git/trees/${branchRef}?recursive=1`);
  const tree=treeRes.tree || [];
  const base=normalizePostsPath();
  const normal=tree.filter(item=>item.type==='blob' && item.path.startsWith(base+'/') && item.path.endsWith('.md') && !item.path.endsWith('_index.md') && !item.path.startsWith('content/trash/'));
  const trash=tree.filter(item=>item.type==='blob' && item.path.startsWith('content/trash/') && item.path.endsWith('.md'));
  const posts=[...(await readPostMetas(normal,false)), ...(await readPostMetas(trash,true))];
  posts.sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));
  STATE.posts=posts;
}

async function readPostMetas(items, isTrash){
  const out=[]; const chunkSize=28;
  for(let i=0;i<items.length;i+=chunkSize){
    const chunk=items.slice(i,i+chunkSize);
    try{
      const fields=chunk.map((p,idx)=>`f${idx}: object(expression: ${JSON.stringify(`${CFG.branch}:${p.path}`)}) { ... on Blob { text } }`).join('\n');
      const query=`query($owner:String!,$repo:String!){ repository(owner:$owner,name:$repo){ ${fields} } }`;
      const data=await ghGraphQL(query,{owner:CFG.owner,repo:CFG.repo});
      chunk.forEach((item,idx)=>{
        const raw=data.repository?.[`f${idx}`]?.text || '';
        out.push(buildPostMeta(item, raw, isTrash));
      });
    }catch(e){
      for(const item of chunk){
        try{ const file=await getFileContent(item.path); out.push(buildPostMeta({...item, sha:file.sha}, file.content, isTrash)); }
        catch(inner){ console.warn('文章读取失败', item.path, inner); }
      }
    }
  }
  return out;
}

function buildPostMeta(item, raw, isTrash){
  const parsed=parseFrontMatter(raw); const fm=parsed.fm || {}; const body=parsed.body || '';
  const tags=normalizeTags(fm.tags); const fileName=item.path.split('/').pop();
  return {
    fileName, path:item.path, sha:item.sha, title:fm.title || fileName, date:fm.date || '', lastmod:fm.lastmod || '',
    tags, draft:isTrash ? false : isDraftValue(fm.draft), isTrash, description:fm.description || '', slug:fm.slug || '',
    excerpt:getExcerpt(body, fm.description), words:countWords(body), minutes:readMinutes(body), originalPath:fm.trashOriginalPath || ''
  };
}

function postCounts(){
  const total=STATE.posts.filter(p=>!p.isTrash).length;
  const drafts=STATE.posts.filter(p=>!p.isTrash && p.draft).length;
  const trash=STATE.posts.filter(p=>p.isTrash).length;
  const published=total-drafts;
  const tags=new Set(); STATE.posts.filter(p=>!p.isTrash).forEach(p=>p.tags.forEach(t=>tags.add(t)));
  return {total,published,drafts,trash,tags:tags.size};
}

function setStatusTab(tab){ STATE.statusTab=tab; STATE.selected.clear(); renderPostsTableBody(); }

function renderStatusTabs(counts){
  const tabs=[['all','全部',counts.total],['published','已发布',counts.published],['draft','草稿',counts.drafts],['trash','回收站',counts.trash]];
  document.getElementById('status-tabs').innerHTML=tabs.map(([key,label,count])=>
    `<button class="seg-btn ${STATE.statusTab===key?'active':''}" onclick="setStatusTab('${key}')">${label}<span class="seg-count">${count}</span></button>`
  ).join('');
}

function renderStats(counts){
  // 顶部统计卡片已移除；保留空函数，避免后续调用报错。
}

function basePostsForFilters(){
  let posts=STATE.posts.slice();
  if(STATE.statusTab==='trash') return posts.filter(p=>p.isTrash);
  posts=posts.filter(p=>!p.isTrash);
  if(STATE.statusTab==='draft') posts=posts.filter(p=>p.draft);
  if(STATE.statusTab==='published') posts=posts.filter(p=>!p.draft);
  return posts;
}

function renderTagFilter(){
  const select=document.getElementById('tag-filter'); if(!select) return;
  const base=basePostsForFilters().filter(p=>STATE.yearFilter==='all' || getPostYear(p)===STATE.yearFilter);
  const tagCounts=new Map();
  base.forEach(p=>p.tags.forEach(t=>tagCounts.set(t,(tagCounts.get(t)||0)+1)));
  const tags=[...tagCounts.keys()].sort((a,b)=>a.localeCompare(b,'zh-CN'));
  const current=STATE.tagFilter;
  select.innerHTML=`<option value="all">全部标签（${base.length}）</option>` +
    tags.map(t=>`<option value="${escapeAttr(t)}"># ${escapeHTML(t)}（${tagCounts.get(t)}）</option>`).join('');
  select.value=tags.includes(current) ? current : 'all'; STATE.tagFilter=select.value;
}

function getPostYear(post){
  const fromDate=String(post?.date || '').match(/^(\d{4})/);
  if(fromDate) return fromDate[1];

  const fromPath=String(post?.path || '').match(/(20\d{2}|19\d{2})/);
  return fromPath ? fromPath[1] : '';
}

function renderYearFilter(){
  const select=document.getElementById('year-filter'); if(!select) return;

  const base=basePostsForFilters().filter(p=>STATE.tagFilter==='all' || p.tags.includes(STATE.tagFilter));
  const yearCounts=new Map();
  base.forEach(p=>{
    const y=getPostYear(p);
    if(y) yearCounts.set(y,(yearCounts.get(y)||0)+1);
  });
  const years=[...yearCounts.keys()].sort((a,b)=>b.localeCompare(a));
  const current=STATE.yearFilter;

  select.innerHTML=`<option value="all">全部年份（${base.length}）</option>` +
    years.map(y=>`<option value="${escapeAttr(y)}">${escapeHTML(y)} 年（${yearCounts.get(y)}）</option>`).join('');

  select.value=years.includes(current) ? current : 'all';
  STATE.yearFilter=select.value;
}

function getFilteredPosts(){
  let posts=STATE.posts.slice();
  if(STATE.statusTab==='trash') posts=posts.filter(p=>p.isTrash);
  else{
    posts=posts.filter(p=>!p.isTrash);
    if(STATE.statusTab==='draft') posts=posts.filter(p=>p.draft);
    if(STATE.statusTab==='published') posts=posts.filter(p=>!p.draft);
  }
  if(STATE.yearFilter !== 'all') posts=posts.filter(p=>getPostYear(p) === STATE.yearFilter);
  if(STATE.tagFilter !== 'all') posts=posts.filter(p=>p.tags.includes(STATE.tagFilter));
  const q=STATE.searchQuery.trim().toLowerCase();
  if(q){
    posts=posts.filter(p=>[p.title,p.description,p.excerpt,p.path,p.slug,...p.tags].some(v=>String(v||'').toLowerCase().includes(q)));
  }
  posts.sort((a,b)=>{
    if(STATE.sortBy==='date_asc') return String(a.date||'').localeCompare(String(b.date||''));
    if(STATE.sortBy==='title_asc') return String(a.title||'').localeCompare(String(b.title||''),'zh-CN');
    if(STATE.sortBy==='words_desc') return (b.words||0)-(a.words||0);
    return String(b.date||'').localeCompare(String(a.date||''));
  });
  return posts;
}

function renderBatchBar(visiblePosts){
  const selected=[...STATE.selected].filter(p=>visiblePosts.some(v=>v.path===p)); STATE.selected=new Set(selected);
  const count=selected.length; const isTrash=STATE.statusTab==='trash';
  const batch=document.getElementById('batch-bar');
  batch.innerHTML=`
    <div><strong>${count}</strong> 篇已选 <span class="muted">/ 当前筛选 ${visiblePosts.length} 篇</span></div>
    <div class="batch-actions">
      ${count?`<button class="btn sm" onclick="clearSelection()">取消选择</button>`:''}
      ${!isTrash?`
        <button class="btn sm" ${count?'':'disabled'} onclick="batchAction('publish')">批量发布</button>

function toggleSelectAll(checked){ getFilteredPosts().forEach(p=>checked?STATE.selected.add(p.path):STATE.selected.delete(p.path)); renderPostsTableBody(); }
function toggleSelectPath(encodedPath, checked){ const path=decodeURIComponent(encodedPath); checked?STATE.selected.add(path):STATE.selected.delete(path); renderPostsTableBody(); }
function clearSelection(){ STATE.selected.clear(); renderPostsTableBody(); }

async function batchAction(action){
  const paths=[...STATE.selected]; if(!paths.length) return;
  const names={publish:'批量发布',draft:'设为草稿',trash:'移入回收站',restore:'批量还原',delete:'永久删除'};
  if(!confirm(`确定对 ${paths.length} 篇文章执行「${names[action]}」吗？`)) return;
  toast(`正在执行：${names[action]}…`);
  try{
    for(const path of paths){
      if(action==='publish') await setDraftByPath(path,false);
      if(action==='draft') await setDraftByPath(path,true);
      if(action==='trash') await movePathToTrash(path,false);
      if(action==='restore') await restorePathFromTrash(path,false);
      if(action==='delete') await deletePathPermanently(path,false);
    }
    STATE.selected.clear(); toast('批量操作完成','success'); renderPostsPage();
  }catch(e){ toast(e.message,'error'); }
}

// ============================================================
// Trash / Status Actions
// ============================================================
function trashPathFor(oldPath){
  const baseName=oldPath.replace(/^content\//,'').replace(/\//g,'--').replace(/[^\w\-.\u4e00-\u9fa5]+/g,'-');
  const stamp=new Date().toISOString().replace(/[-:.TZ]/g,'').slice(0,14);
  return `content/trash/${stamp}-${baseName}`;
}

async function moveToTrash(encodedPath){ const path=decodeURIComponent(encodedPath); if(!confirm('确定将此文章移入回收站吗？移入后前台将不再展示。')) return; await movePathToTrash(path,true); }
async function movePathToTrash(oldPath, rerender=true){
  const file=await getFileContent(oldPath); const parsed=parseFrontMatter(file.content); const fm={...parsed.fm};
  fm.trashOriginalPath=oldPath; fm.deletedAt=new Date().toISOString(); fm.draft=true;
  const newPath=trashPathFor(oldPath); const title=fm.title || oldPath.split('/').pop();
  await putFile(newPath, buildFrontMatter(fm, parsed.body), null, `trash: move ${title} to recycle bin`);
  await deleteFile(oldPath, file.sha, `trash: remove source ${title}`);
  if(rerender){ toast('文章已移入回收站','success'); renderPostsPage(); }
}

async function restoreFromTrash(encodedPath){ const path=decodeURIComponent(encodedPath); await restorePathFromTrash(path,true); }
async function restorePathFromTrash(oldPath, rerender=true){
  const file=await getFileContent(oldPath); const parsed=parseFrontMatter(file.content); const fm={...parsed.fm};
  const fallbackName=oldPath.split('/').pop().replace(/^\d{14}-/,'');
  const newPath=fm.trashOriginalPath || `${normalizePostsPath()}/${fallbackName}`;
  const title=fm.title || fallbackName;
  delete fm.trashOriginalPath; delete fm.deletedAt;
  await putFile(newPath, buildFrontMatter(fm, parsed.body), null, `trash: restore ${title}`);
  await deleteFile(oldPath, file.sha, `trash: clear trash snapshot ${title}`);
  if(rerender){ toast('文章已还原','success'); renderPostsPage(); }
}

async function physicsDeletePost(encodedPath){ const path=decodeURIComponent(encodedPath); if(!confirm('确定永久删除这篇文章吗？该操作无法恢复。')) return; await deletePathPermanently(path,true); }
async function deletePathPermanently(path, rerender=true){
  const file=await getFileContent(path); const title=(STATE.posts.find(p=>p.path===path)?.title) || path.split('/').pop();
  await deleteFile(path, file.sha, `delete post permanently: ${title}`);
  if(rerender){ toast('文章已永久删除','success'); renderPostsPage(); }
}

async function toggleDraft(encodedPath, isDraft){
  const path=decodeURIComponent(encodedPath);
  try{ await setDraftByPath(path, !isDraft); toast(isDraft?'文章已发布':'文章已下架为草稿','success'); renderPostsPage(); }
  catch(e){ toast(e.message,'error'); }
}

async function toggleDraftFromReader(encodedPath, isDraft){
  const path=decodeURIComponent(encodedPath);
  try{
    await setDraftByPath(path, !isDraft);
    toast(isDraft?'文章已发布':'文章已下架为草稿','success');
    await loadPosts();
    viewPost(encodedPath);
  }catch(e){ toast(e.message,'error'); }
}

async function setDraftByPath(path, draft){
  const file=await getFileContent(path); const parsed=parseFrontMatter(file.content); const fm={...parsed.fm};
  fm.draft=!!draft; fm.lastmod=nowLocalString();
  await putFile(path, buildFrontMatter(fm, parsed.body), file.sha, `${draft?'draft':'publish'}: ${fm.title || path}`);
}

async function viewPost(encodedPath){
  const path=decodeURIComponent(encodedPath); const c=document.getElementById('main-content'); STATE.page='reader';
  document.getElementById('page-title').innerHTML='文章预览 <small>Markdown 渲染快照</small>';

  c.style.overflow='auto'; c.innerHTML=`<div class="loading"><div class="spinner"></div>正在生成文章预览…</div>`;
  try{
    const file=await getFileContent(path); const {fm,body}=parseFrontMatter(file.content);
    const tags=normalizeTags(fm.tags); const htmlContent=marked.parse(body||'*当前文章无正文内容*');
    const publicLink=CFG.blogUrl && (fm.slug || path) ? buildPublicUrl(fm, path) : '';
    const isTrashPost=path.startsWith('content/trash/');
    const isDraftPost=isDraftValue(fm.draft);
    const actionButtons=isTrashPost ? `
      <button class="btn" onclick="restoreFromTrash('${encodedPath}')">还原文章</button>
      <button class="btn primary" onclick="showPage('posts')">返回列表</button>
      <button class="btn danger" onclick="physicsDeletePost('${encodedPath}')">永久删除</button>` : `
      <button class="btn primary" onclick="openEditPost('${encodedPath}')">编辑文章</button>
      <button class="btn primary" onclick="showPage('posts')">返回列表</button>`;
    c.innerHTML=`
      <div class="reader-wrap">
        <div class="reader-header">
          <div class="reader-title-row">
            <h1 class="reader-title">${escapeHTML(fm.title || path.split('/').pop())}</h1>
            <div class="reader-title-actions">${actionButtons}</div>
          </div>
          ${fm.description?`<div class="reader-desc">${escapeHTML(fm.description)}</div>`:''}
          <div class="reader-meta">
            <span>📅 ${escapeHTML(formatDate(fm.date))}</span>
            <span>📂 <span class="mono">${escapeHTML(path)}</span></span>
            <span>✍️ ${countWords(body)} 字 · ${readMinutes(body)} 分钟</span>
            <span><span class="tag ${isTrashPost?'trash':(isDraftPost?'draft':'published')}">${isTrashPost?'回收站':(isDraftPost?'草稿':'已发布')}</span></span>
            ${tags.length?`<span>🏷️ ${tags.map(t=>`<span class="tag soft">${escapeHTML(t)}</span>`).join(' ')}</span>`:''}
            ${publicLink&&!isTrashPost?`<a class="tag published" href="${escapeAttr(publicLink)}" target="_blank" rel="noopener">跳转前台</a>`:''}
          </div>
        </div>
        <div class="markdown-body">${htmlContent}</div>
      </div>`;
  }catch(e){ toast(e.message,'error'); renderPostsPage(); }

function buildPublicUrl(fm, path){
  const base=String(CFG.blogUrl||'').replace(/\/$/,'');
  const slug=fm.slug || path.split('/').pop().replace(/\.md$/,'');
  return `${base}/posts/${encodeURIComponent(slug).replace(/%2F/g,'/')}/`;
}

function editorShortcut(e){ if(STATE.page==='editor' && (e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='s'){ e.preventDefault(); savePost('draft'); } }
function tagChip(t){ return `<span class="tag-chip">${escapeHTML(t)}<span class="remove" onclick="removeTagNode(this,'${escapeAttr(t)}')">×</span></span>`; }
function markDirty(){ STATE.dirty=true; const ds=document.getElementById('dirty-state'); if(ds) ds.textContent='有未保存修改'; scheduleLocalDraft(); }
function updateDraftTag(){ const el=document.getElementById('draft-tag'); const checked=document.getElementById('fm-draft')?.checked; if(el){ el.className=`tag ${checked?'draft':'published'}`; el.textContent=checked?'草稿':'发布'; } }
function refreshEditorMeta(){
  const body=STATE.mde?STATE.mde.value():''; const wc=countWords(body); const path=document.getElementById('fm-path')?.value || '';
  const word=document.getElementById('word-counter'); if(word) word.textContent=`${wc} 字 · ${Math.max(1,Math.ceil(wc/400))} 分钟`;
  const pp=document.getElementById('path-preview'); if(pp) pp.textContent=path;
}
function getFormValue(id, fallback=''){
  const el=document.getElementById(id);
  return el && 'value' in el ? String(el.value).trim() : fallback;
}

function collectEditorData(mode='draft'){
  const title=getFormValue('fm-title');
  if(!title) throw new Error('文章标题不可为空');

  const slug=getFormValue('fm-slug') || slugify(title);
  const defaultPath=STATE.editingPost?.path || `${normalizePostsPath()}/${slug}.md`;

  let path=cleanPath(getFormValue('fm-path', defaultPath));
  if(!path) path=`${normalizePostsPath()}/${slug}.md`;
  if(!path.endsWith('.md')) path += '.md';

  const draft = mode==='publish' ? false : true;

  const fm={
    ...(STATE.editingPost.fm||{}),
    title,
    author:getFormValue('fm-author'),
    date:getFormValue('fm-date', nowLocalString()) || nowLocalString(),
    lastmod:nowLocalString(),
    description:getFormValue('fm-description'),
    tags:STATE.activeTags,
    slug,
    draft
  };

  delete fm.trashOriginalPath;
  delete fm.deletedAt;

  return {
    fm,
    body:STATE.mde ? STATE.mde.value() : '',
    path
  };
}
async function savePost(mode){
  const btn=document.getElementById(mode==='publish'?'btn-publish':'btn-save-draft');
  try{
    const data=collectEditorData(mode); btn.disabled=true; btn.textContent=mode==='publish'?'正在发布…':'正在保存…';
    const oldPath=STATE.editingPost.path; const content=buildFrontMatter(data.fm, data.body);
    if(oldPath && oldPath !== data.path){
      await putFile(data.path, content, null, `content: move and update ${data.fm.title}`);
      await deleteFile(oldPath, STATE.editingPost.sha, `content: remove old path ${oldPath}`);
    }else{
      await putFile(data.path, content, STATE.editingPost.sha, `content: ${mode==='publish'?'publish':'save draft'} ${data.fm.title}`);
    }
    clearLocalDraftByKey(localDraftKey(oldPath || '__new__'));
    STATE.dirty=false; toast(mode==='publish'?'文章已发布/更新，等待 Vercel 构建':'草稿已保存到 GitHub','success'); setTimeout(()=>showPage('posts'),500);
  }catch(e){ toast(e.message,'error'); }
  finally{ if(btn){ btn.disabled=false; btn.textContent=mode==='publish'?'发布/更新':'保存草稿'; } }
}

function handleTagPush(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault(); const val=e.target.value.trim().replace(/^#/,'');
    if(val && !STATE.activeTags.includes(val)){ STATE.activeTags.push(val); document.getElementById('tags-wrap').insertAdjacentHTML('afterbegin', tagChip(val)); markDirty(); }
    e.target.value='';
  }else if(e.key==='Backspace' && e.target.value===''){
    STATE.activeTags.pop(); const chips=document.querySelectorAll('.tag-chip'); if(chips.length) chips[chips.length-1].remove(); markDirty();
  }
}
function removeTagNode(el,val){ STATE.activeTags=STATE.activeTags.filter(t=>t!==val); el.parentElement.remove(); markDirty(); }

function localDraftKey(path){ return `hugo_admin_local_draft:${CFG.owner}/${CFG.repo}:${path}`; }
function readLocalDraft(path){ try{ const s=localStorage.getItem(localDraftKey(path)); return s?JSON.parse(s):null; }catch(e){ return null; } }
function scheduleLocalDraft(){
  clearTimeout(STATE.autosaveTimer);
  STATE.autosaveTimer=setTimeout(()=>{
    if(STATE.page!=='editor') return;
    try{
      const data=collectEditorData(document.getElementById('fm-draft')?.checked?'draft':'publish');
      const key=localDraftKey(STATE.editingPost.path || '__new__');
      localStorage.setItem(key, JSON.stringify({...STATE.editingPost, ...data, fm:data.fm, body:data.body, path:STATE.editingPost.path, isNew:STATE.editingPost.isNew}));
      STATE.lastAutosaveAt=new Date();
      const txt=`本地草稿 ${STATE.lastAutosaveAt.toLocaleTimeString()} 已保存`;
      const a=document.getElementById('autosave-text'); if(a) a.textContent=txt;
      const b=document.getElementById('autosave-card-text'); if(b) b.textContent=txt;
    }catch(e){}
  },700);
}
function clearLocalDraftByKey(key){ try{ localStorage.removeItem(key); }catch(e){} }
function clearCurrentLocalDraft(){ clearLocalDraftByKey(localDraftKey(STATE.editingPost?.path || '__new__')); toast('当前本地草稿已清除','success'); }

    const commits=await ghFetch('/commits?per_page=8');
    c.innerHTML=`
      <div class="card"><div class="card-header"><div><div class="card-title">Vercel 云端构建状态</div><div class="card-desc">保存文章后，Vercel 通常会按 GitHub 集成自动构建。</div></div>${vStatus}</div></div>
      <div class="card"><div class="card-header"><div><div class="card-title">最近提交记录</div><div class="card-desc">用于确认文章保存是否已经落到 GitHub。</div></div></div>
      <div class="table-wrap"><table><thead><tr><th>SHA</th><th>提交信息</th><th>作者</th><th>时间</th></tr></thead><tbody>
      ${commits.map(cm=>`<tr><td><span class="mono">${cm.sha.slice(0,7)}</span></td><td>${escapeHTML(cm.commit.message)}</td><td>${escapeHTML(cm.commit.author.name)}</td><td class="muted nowrap">${new Date(cm.commit.author.date).toLocaleString()}</td></tr>`).join('')}
      </tbody></table></div></div>`;
  }catch(e){ c.innerHTML=`<div class="alert danger">${escapeHTML(e.message)}</div>`; }
}

async function triggerRedeploy(){
  if(!confirm('确定创建一个空提交以触发 Vercel 重新构建吗？')) return;
  try{
    const ref=await ghFetch(`/git/ref/heads/${encodeURIComponent(CFG.branch).replace(/%2F/g,'/')}`); const cSha=ref.object.sha;
    const commit=await ghFetch(`/git/commits/${cSha}`);
    const nCommit=await ghFetch('/git/commits',{method:'POST',body:JSON.stringify({message:'chore: force vercel redeploy from blog admin',tree:commit.tree.sha,parents:[cSha]})});
    await ghFetch(`/git/refs/heads/${encodeURIComponent(CFG.branch).replace(/%2F/g,'/')}`,{method:'PATCH',body:JSON.stringify({sha:nCommit.sha})});
    toast('重新构建已触发','success'); setTimeout(renderDeployPage,900);
  }catch(e){ toast(e.message,'error'); }
}

// Settings
// ============================================================
function renderSettingsPage(){
  document.getElementById('page-title').innerHTML='系统设置 <small>本地浏览器保存</small>';
  document.getElementById('topbar-actions').innerHTML=`<button class="btn primary" onclick="saveAllSettings()">保存设置</button>`;
  const c=document.getElementById('main-content');
  c.innerHTML=`
    <div class="alert info" style="max-width:880px">Token 会保存在当前浏览器 localStorage 中。建议使用权限最小化的 GitHub Fine-grained Token，仅授予目标仓库 Contents 读写权限。</div>
    <div class="card" style="max-width:880px">
      <div class="section-title" style="margin-top:0">GitHub 仓库参数</div>
      <div class="settings-grid">
        <div class="setting-group"><label class="setting-label">Owner / 账户或组织</label><input class="setting-input" id="s-owner" value="${escapeAttr(CFG.owner||'')}"></div>
        <div class="setting-group"><label class="setting-label">Repo / 仓库名</label><input class="setting-input" id="s-repo" value="${escapeAttr(CFG.repo||'')}"></div>
        <div class="setting-group" style="grid-column:span 2"><label class="setting-label">GitHub Token / PAT</label><input class="setting-input" type="password" id="s-token" value="${escapeAttr(CFG.token||'')}"></div>
        <div class="setting-group"><label class="setting-label">Branch / 默认分支</label><input class="setting-input" id="s-branch" value="${escapeAttr(CFG.branch||'main')}"></div>
        <div class="setting-group"><label class="setting-label">Posts Path / 文章根目录</label><input class="setting-input" id="s-posts" value="${escapeAttr(CFG.postsPath||'content/posts')}"></div>
      </div>
      <div class="section-title">站点与部署扩展</div>
      <div class="settings-grid">
        <div class="setting-group"><label class="setting-label">博客前台网址</label><input class="setting-input" id="s-blog" value="${escapeAttr(CFG.blogUrl||'')}"></div>
        <div class="setting-group"><label class="setting-label">Vercel Project ID</label><input class="setting-input" id="s-v-id" value="${escapeAttr(CFG.vercelProjectId||'')}"></div>
        <div class="setting-group" style="grid-column:span 2"><label class="setting-label">Vercel Token</label><input class="setting-input" type="password" id="s-v-token" value="${escapeAttr(CFG.vercelToken||'')}"></div>
      </div>
    </div>`;
}

function saveAllSettings(){
  CFG.owner=document.getElementById('s-owner').value.trim(); CFG.repo=document.getElementById('s-repo').value.trim();
  CFG.token=document.getElementById('s-token').value.trim(); CFG.branch=document.getElementById('s-branch').value.trim()||'main';
  CFG.postsPath=cleanPath(document.getElementById('s-posts').value.trim()||'content/posts'); CFG.blogUrl=document.getElementById('s-blog').value.trim();
  CFG.vercelProjectId=document.getElementById('s-v-id').value.trim(); CFG.vercelToken=document.getElementById('s-v-token').value.trim();
  saveCfg(); toast('设置已保存到当前浏览器','success'); checkStatus();
}

// ============================================================
// Lifecycle
// ============================================================
window.addEventListener('DOMContentLoaded', async()=>{
  loadCfg(); const active=await checkStatus();
  if(active) showPage('posts'); else { showPage('settings'); toast('请先配置 GitHub 仓库信息。','warning'); }
});
</script>
